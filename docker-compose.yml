version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: paulopop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paulopop
      POSTGRES_PASSWORD: paulopop123
      POSTGRES_DB: paulopop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paulopop -d paulopop"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paulopop_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://paulopop:paulopop123@postgres:5432/paulopop
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: Paulo Pop
      NEXT_PUBLIC_WHATSAPP: ${NEXT_PUBLIC_WHATSAPP:-5561912345678}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: paulopop_migrate
    environment:
      DATABASE_URL: postgresql://paulopop:paulopop123@postgres:5432/paulopop
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  uploads_data:
